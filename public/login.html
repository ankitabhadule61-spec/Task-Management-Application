<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<style>
  /* Make the navbar icon colorful */
    .navbar-brand i {
      color: #FFD700; /* golden yellow */
      margin-left: 6px;
    }
    .navbar-brand i:hover {
      color: #FF4500; /* orange-red on hover */
    }
</style>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html">
      Task Manager <i class="bi bi-journal-text"></i>
    </a>
  </div>
</nav>


  <!-- Main Container -->
  <div class="container mt-4">
    <h2 class="fw-bold mb-3">Login</h2>

    <form id="loginForm" class="card p-4 shadow-sm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
      <a href="register.html" class="btn btn-link">Need an account? Register</a>
    </form>

    <div id="loginResult" class="mt-3"></div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/auth/login";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          document.getElementById('loginResult').innerHTML =
            `<div class="alert alert-success">Login successful! Redirecting...</div>`;
          setTimeout(() => window.location.href = "index.html", 1000);
        } else {
          // Handle validation errors nicely
          if (data.errors && Array.isArray(data.errors)) {
            const messages = data.errors.map(err => `<li>${err.msg}</li>`).join("");
            document.getElementById('loginResult').innerHTML =
              `<div class="alert alert-danger"><ul>${messages}</ul></div>`;
          } else {
            document.getElementById('loginResult').innerHTML =
              `<div class="alert alert-danger">${data.message || "Login failed"}</div>`;
          }
        }
      } catch (err) {
        document.getElementById('loginResult').innerHTML =
          `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
