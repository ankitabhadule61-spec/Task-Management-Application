<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Manager App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
  /* Make the navbar icon colorful */
  .navbar-brand i {
    color: #FFD700;
    margin-left: 6px;
  }

  .navbar-brand i:hover {
    color: #FF4500;
  }

  /* Responsive buttons on mobile */
  @media (max-width: 768px) {

    .navbar .container-fluid {
      flex-direction: column;
      gap: 10px;
    }

    .navbar .ms-auto {
      width: 100%;
      display: flex;
      gap: 8px;
    }

    .navbar .ms-auto a,
    .navbar .ms-auto button {
      flex: 1;
    }

    .card-body .d-flex.justify-content-between {
      flex-direction: column;
      gap: 8px;
    }

    .card-body .btn {
      width: 100%;
    }

    h2 {
      text-align: center;
    }
  }
</style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">
        Task Manager <i class="bi bi-journal-text"></i>
      </a>

      <div class="ms-auto">
        <a href="add.html" class="btn btn-success me-2">+ Add Task</a>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-4">
    <h2 class="fw-bold mb-3">My Tasks</h2>
    <div id="alertBox"></div>
    <div id="taskList" class="row g-3"></div>
  </div>

  <!-- ✅ SOCKET.IO CLIENT ADDED -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const API_URL = "http://localhost:5000/tasks";
    const token = localStorage.getItem('token');

    // Redirect if not logged in
    if (!token) {
      window.location.href = "login.html";
    }

    // ✅ SOCKET CONNECTION (ADDED)
    const socket = io("http://localhost:5000");

    socket.on("taskUpdated", () => {
      loadTasks(); // auto refresh UI
    });

    // Show alert messages
    function showAlert(message, type = "danger") {
      document.getElementById('alertBox').innerHTML =
        `<div class="alert alert-${type}">${message}</div>`;
    }

    // Load Tasks
    async function loadTasks() {
      try {
        const response = await fetch(API_URL, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          showAlert("Failed to load tasks. Please login again.");
          return;
        }

        const tasks = await response.json();

        const list = tasks.map(task => {
          let overdue = task.isOverdue ? "<span class='badge bg-danger ms-2'>⚠️ Overdue</span>" : "";

          return `
           <div class="col-12 col-sm-6 col-lg-4">
              <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title">${task.title} ${overdue}</h5>
                  <p class="card-text flex-grow-1">${task.description || ""}</p>
                  <p><strong>Due:</strong> ${task.dueDate ? new Date(task.dueDate).toLocaleDateString() : "No due date"}</p>
                  <p><strong>Status:</strong> ${task.completed ? "✅ Completed" : "⏳ Pending"}</p>

                  <div class="d-flex justify-content-between mt-auto">
                    <button class="btn btn-sm ${task.completed ? 'btn-warning' : 'btn-success'}"
                            onclick="toggleComplete('${task._id}', ${task.completed})">
                      ${task.completed ? 'Mark Pending' : 'Mark Complete'}
                    </button>

                    <a href="add.html?id=${task._id}" class="btn btn-sm btn-primary">Edit</a>

                    <button class="btn btn-sm btn-danger" onclick="deleteTask('${task._id}')">
                      Delete
                    </button>
                  </div>
                </div>
              </div>
            </div>`;
        }).join("");

        document.getElementById('taskList').innerHTML =
          list || "<p class='text-muted'>No tasks yet. Add one above.</p>";

      } catch (err) {
        showAlert("Error loading tasks: " + err.message);
      }
    }

    // Toggle Complete
    async function toggleComplete(id, currentStatus) {
      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ completed: !currentStatus })
        });

        if (!response.ok) {
          showAlert("Failed to update task status.");
          return;
        }

        loadTasks();

      } catch (err) {
        showAlert("Error updating task: " + err.message);
      }
    }

    // Delete Task
    async function deleteTask(id) {
      if (!confirm("Delete this task?")) return;

      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          showAlert("Failed to delete task.");
          return;
        }

        loadTasks();

      } catch (err) {
        showAlert("Error deleting task: " + err.message);
      }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = "login.html";
    });

    // Initial load
    loadTasks();
  </script>

</body>
</html>
